<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Speed Optimizations & Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    
    <!-- SEO Optimization Meta Tags -->
    <title>PineBrook | Scalable GCC, AI Automation & Digital Advisory</title>
    <meta name="description" content="PineBrook streamlines precision AI engineering, builds scalable Global Capability Centres (GCC), and provides strategic digital advisory to eliminate operational bottlenecks." />
    <meta name="keywords" content="PineBrook, GCC setup, AI automation, digital advisory, digital acceleration, technology roadmaps, precision engineering, Uttarakhand tech ecosystem" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="google-site-verification-code-here" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pinebrook.tech/" />
    <meta property="og:title" content="PineBrook | Scalable GCC, AI Automation & Digital Advisory" />
    <meta property="og:description" content="Eliminate bottlenecks, scale workflows, and optimize operations. Explore our Global Capability Centre (GCC), Automation, and Digital Advisory pillars." />
    <meta property="og:image" content="https://pinebrook.tech/logo.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pinebrook.tech/" />
    <meta property="twitter:title" content="PineBrook | Scalable GCC, AI Automation & Digital Advisory" />
    <meta property="twitter:description" content="Eliminate bottlenecks, scale workflows, and optimize operations with veteran technology leadership." />
    <meta property="twitter:image" content="https://pinebrook.tech/logo.webp" />
    
    <!-- Favicon link details -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <!-- Preload Critical Above-The-Fold Assets -->
    <link rel="preload" href="/logo.webp" as="image" type="image/webp" />
    <link rel="preload" href="/pinebrook_logo.webp" as="image" type="image/webp" />
    <!-- JSON-LD Structured Data Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PineBrook",
        "url": "https://pinebrook.tech/",
        "logo": "https://pinebrook.tech/logo.webp",
        "description": "PineBrook streamlines precision AI engineering, builds scalable Global Capability Centres (GCC), and provides strategic digital advisory to eliminate operational bottlenecks.",
        "sameAs": [
          "https://github.com/PineBrook",
          "https://www.linkedin.com/company/pinebrook"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
